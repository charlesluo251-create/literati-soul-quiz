<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>千年一梦 · 测测你是哪位文人墨客</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;600;700;900&family=Ma+Shan+Zheng&display=swap');

  :root {
    --bg-primary: #0a0a12;
    --bg-card: rgba(20, 18, 30, 0.85);
    --gold: #d4a853;
    --gold-light: #f0d48a;
    --gold-dark: #a07830;
    --text-primary: #e8e0d0;
    --text-secondary: #a09882;
    --text-muted: #6b6356;
    --ink: #2a2540;
    --border: rgba(212, 168, 83, 0.2);
    --red-accent: #c45c4a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Serif SC', serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ===== 动态背景 ===== */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .bg-layer::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(212, 168, 83, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(120, 80, 40, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(42, 37, 64, 0.3) 0%, transparent 70%);
    animation: bgFloat 30s ease-in-out infinite;
  }

  @keyframes bgFloat {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(2%, -1%) rotate(1deg); }
    66% { transform: translate(-1%, 2%) rotate(-1deg); }
  }

  /* 飘落花瓣 */
  .petal {
    position: fixed;
    width: 12px;
    height: 12px;
    opacity: 0;
    z-index: 1;
    pointer-events: none;
  }

  .petal::before {
    content: '🌸';
    font-size: 14px;
    position: absolute;
    top: 0;
    left: 0;
  }

  @keyframes petalFall {
    0% { opacity: 0; transform: translateY(-20px) rotate(0deg) scale(0.8); }
    10% { opacity: 0.6; }
    90% { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.4); }
  }

  /* 山水剪影 */
  .mountain-bg {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 40vh;
    z-index: 0;
    opacity: 0.06;
    background:
      linear-gradient(135deg, transparent 33%, var(--gold-dark) 33%, var(--gold-dark) 34%, transparent 34%),
      linear-gradient(225deg, transparent 33%, var(--gold-dark) 33%, var(--gold-dark) 34%, transparent 34%);
    background-size: 80px 140px;
  }

  /* ===== 容器 ===== */
  .container {
    position: relative;
    z-index: 2;
    max-width: 720px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ===== 首页 ===== */
  .start-page {
    text-align: center;
    animation: fadeIn 1.2s ease;
  }

  .start-page .title-group {
    margin-bottom: 20px;
  }

  .start-page .sub-title {
    font-size: 14px;
    letter-spacing: 8px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
    font-weight: 300;
  }

  .start-page h1 {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(42px, 8vw, 68px);
    color: var(--gold-light);
    line-height: 1.3;
    text-shadow: 0 0 40px rgba(212, 168, 83, 0.2);
    margin-bottom: 12px;
  }

  .start-page .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 24px auto;
  }

  .start-page .description {
    font-size: 15px;
    line-height: 2;
    color: var(--text-secondary);
    max-width: 480px;
    margin: 0 auto 40px;
    font-weight: 300;
  }

  .start-page .description em {
    color: var(--gold-light);
    font-style: normal;
  }

  /* 装饰画框 */
  .frame-decoration {
    width: 200px;
    height: 200px;
    margin: 0 auto 36px;
    position: relative;
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle, rgba(212, 168, 83, 0.05) 0%, transparent 70%);
  }

  .frame-decoration::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(212, 168, 83, 0.1);
    border-radius: 4px;
  }

  .frame-decoration .ink-text {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 48px;
    color: var(--gold);
    opacity: 0.7;
    writing-mode: vertical-rl;
    letter-spacing: 12px;
  }

  /* 文人列表预览 */
  .literati-preview {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 40px;
  }

  .literati-preview span {
    font-size: 13px;
    color: var(--text-muted);
    padding: 4px 12px;
    border: 1px solid rgba(212, 168, 83, 0.1);
    border-radius: 20px;
    font-weight: 300;
  }

  /* 按钮 */
  .btn-primary {
    display: inline-block;
    padding: 16px 56px;
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    color: var(--bg-primary);
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 4px;
    font-weight: 600;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: translateX(-100%);
    transition: transform 0.6s ease;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(212, 168, 83, 0.3);
  }

  .btn-primary:hover::before {
    transform: translateX(100%);
  }

  /* ===== 问卷页 ===== */
  .quiz-page {
    width: 100%;
    animation: fadeIn 0.6s ease;
  }

  .quiz-page.hidden { display: none; }

  /* 进度条 */
  .progress-bar {
    width: 100%;
    margin-bottom: 48px;
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
  }

  .progress-info .current-q {
    color: var(--gold);
    font-weight: 400;
  }

  .progress-track {
    width: 100%;
    height: 2px;
    background: rgba(212, 168, 83, 0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
    border-radius: 2px;
    transition: width 0.5s ease;
    box-shadow: 0 0 10px rgba(212, 168, 83, 0.4);
  }

  /* 问题卡片 */
  .question-card {
    animation: slideIn 0.5s ease;
  }

  .question-card .q-label {
    font-size: 12px;
    color: var(--gold-dark);
    letter-spacing: 3px;
    margin-bottom: 16px;
    font-weight: 300;
  }

  .question-card .q-text {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(22px, 4vw, 28px);
    line-height: 1.6;
    color: var(--text-primary);
    margin-bottom: 36px;
    text-shadow: 0 0 20px rgba(232, 224, 208, 0.1);
  }

  .question-card .q-scene {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
    line-height: 1.8;
    margin-bottom: 28px;
    padding-left: 16px;
    border-left: 2px solid var(--gold-dark);
  }

  /* 选项 */
  .options {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 24px;
    background: var(--bg-card);
    border: 1px solid rgba(212, 168, 83, 0.08);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.35s ease;
    text-align: left;
    font-family: 'Noto Serif SC', serif;
  }

  .option-btn:hover {
    border-color: rgba(212, 168, 83, 0.3);
    background: rgba(212, 168, 83, 0.06);
    transform: translateX(4px);
  }

  .option-btn .option-label {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(212, 168, 83, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--gold);
    flex-shrink: 0;
    transition: all 0.35s ease;
    font-weight: 300;
  }

  .option-btn:hover .option-label {
    border-color: var(--gold);
    background: rgba(212, 168, 83, 0.15);
  }

  .option-btn .option-text {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.6;
    font-weight: 300;
    transition: color 0.35s ease;
  }

  .option-btn:hover .option-text {
    color: var(--text-primary);
  }

  .option-btn.selected {
    border-color: var(--gold);
    background: rgba(212, 168, 83, 0.1);
  }

  .option-btn.selected .option-label {
    background: var(--gold);
    color: var(--bg-primary);
    border-color: var(--gold);
  }

  .option-btn.selected .option-text {
    color: var(--gold-light);
  }

  /* ===== 结果页 ===== */
  .result-page {
    width: 100%;
    animation: fadeIn 1s ease;
  }

  .result-page.hidden { display: none; }

  .result-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .result-header .label {
    font-size: 13px;
    color: var(--gold-dark);
    letter-spacing: 6px;
    margin-bottom: 20px;
    font-weight: 300;
  }

  .result-header h2 {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(48px, 10vw, 72px);
    color: var(--gold-light);
    text-shadow: 0 0 60px rgba(212, 168, 83, 0.25);
    margin-bottom: 8px;
  }

  .result-header .dynasty {
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: 4px;
    font-weight: 300;
  }

  /* 文人画像 */
  .portrait-frame {
    width: 280px;
    height: 360px;
    margin: 0 auto 40px;
    position: relative;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: linear-gradient(180deg, rgba(42, 37, 64, 0.5), rgba(20, 18, 30, 0.8));
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .portrait-frame::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(212, 168, 83, 0.1);
    border-radius: 8px;
    pointer-events: none;
    z-index: 2;
  }

  .portrait-frame .portrait-art {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.9;
  }

  .portrait-frame .portrait-placeholder {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 80px;
    color: var(--gold);
    opacity: 0.15;
    writing-mode: vertical-rl;
    letter-spacing: 20px;
    line-height: 1.2;
  }

  .portrait-corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--gold);
    z-index: 3;
  }
  .portrait-corner.tl { top: 12px; left: 12px; border-top: 1px solid; border-left: 1px solid; }
  .portrait-corner.tr { top: 12px; right: 12px; border-top: 1px solid; border-right: 1px solid; }
  .portrait-corner.bl { bottom: 12px; left: 12px; border-bottom: 1px solid; border-left: 1px solid; }
  .portrait-corner.br { bottom: 12px; right: 12px; border-bottom: 1px solid; border-right: 1px solid; }

  /* 诗词卡片 */
  .poem-card {
    text-align: center;
    padding: 40px 32px;
    margin-bottom: 32px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    position: relative;
    overflow: hidden;
  }

  .poem-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .poem-card .poem-source {
    font-size: 13px;
    color: var(--gold-dark);
    margin-bottom: 20px;
    letter-spacing: 3px;
    font-weight: 300;
  }

  .poem-card .poem-text {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(20px, 4vw, 26px);
    line-height: 2;
    color: var(--gold-light);
    text-shadow: 0 0 20px rgba(212, 168, 83, 0.15);
    letter-spacing: 2px;
  }

  .poem-card .poem-title {
    margin-top: 16px;
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
  }

  /* 性格解读 */
  .analysis-section {
    margin-bottom: 36px;
  }

  .analysis-section h3 {
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 4px;
    margin-bottom: 16px;
    font-weight: 400;
    text-align: center;
  }

  .analysis-section .analysis-text {
    font-size: 15px;
    line-height: 2;
    color: var(--text-secondary);
    font-weight: 300;
    padding: 24px;
    background: var(--bg-card);
    border: 1px solid rgba(212, 168, 83, 0.06);
    border-radius: 12px;
  }

  /* 性格标签 */
  .trait-tags {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-bottom: 36px;
  }

  .trait-tag {
    font-size: 13px;
    padding: 6px 18px;
    border: 1px solid rgba(212, 168, 83, 0.15);
    border-radius: 20px;
    color: var(--gold);
    font-weight: 300;
    letter-spacing: 2px;
  }

  /* 同类文人 */
  .kindred-section {
    text-align: center;
    margin-bottom: 36px;
  }

  .kindred-section h3 {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 4px;
    margin-bottom: 16px;
    font-weight: 300;
  }

  .kindred-list {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .kindred-item {
    padding: 8px 20px;
    background: rgba(212, 168, 83, 0.04);
    border: 1px solid rgba(212, 168, 83, 0.1);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 300;
  }

  .kindred-item .match-pct {
    display: block;
    font-size: 11px;
    color: var(--gold-dark);
    margin-top: 2px;
  }

  /* 操作按钮 */
  .result-actions {
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }

  .btn-secondary {
    display: inline-block;
    padding: 14px 44px;
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    color: var(--gold);
    background: transparent;
    border: 1px solid rgba(212, 168, 83, 0.3);
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 3px;
    font-weight: 300;
    transition: all 0.4s ease;
  }

  .btn-secondary:hover {
    border-color: var(--gold);
    background: rgba(212, 168, 83, 0.08);
  }

  /* ===== 版权 ===== */
  .copyright {
    text-align: center;
    padding: 40px 20px 20px;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 200;
    line-height: 1.8;
    letter-spacing: 1px;
  }

  .copyright .copy-line {
    opacity: 0.6;
  }

  /* ===== 动画 ===== */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes sealStamp {
    0% { transform: scale(1.3) rotate(-5deg); opacity: 0; }
    60% { transform: scale(0.95) rotate(1deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .seal-stamp {
    display: inline-block;
    width: 48px;
    height: 48px;
    border: 2px solid var(--red-accent);
    border-radius: 6px;
    color: var(--red-accent);
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 20px;
    line-height: 44px;
    text-align: center;
    margin: 0 auto 24px;
    animation: sealStamp 0.8s ease 0.5s both;
  }

  /* ===== 加载动画 ===== */
  .loading-page {
    text-align: center;
    animation: fadeIn 1s ease;
  }

  .loading-page .loading-text {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 24px;
    color: var(--gold);
    margin-bottom: 24px;
  }

  .loading-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
  }

  .loading-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.3;
    animation: dotPulse 1.4s ease infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
    40% { opacity: 1; transform: scale(1.5); }
  }

  /* ===== 响应式 ===== */
  @media (max-width: 640px) {
    .container { padding: 16px; }
    .option-btn { padding: 14px 16px; gap: 12px; }
    .portrait-frame { width: 240px; height: 310px; }
    .poem-card { padding: 28px 20px; }
  }

  /* 粒子效果 */
  .particle {
    position: fixed;
    width: 2px;
    height: 2px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    animation: particleFade 8s ease-in-out infinite;
  }

  @keyframes particleFade {
    0%, 100% { opacity: 0; }
    50% { opacity: 0.4; }
  }

  /* 隐藏类 */
  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- 背景层 -->
<div class="bg-layer"></div>
<div class="mountain-bg"></div>

<!-- 首页 -->
<div class="container" id="startPage">
  <div class="start-page">
    <div class="title-group">
      <div class="sub-title">千 年 一 梦</div>
      <h1>你是哪位文人墨客</h1>
    </div>

    <div class="frame-decoration">
      <div class="ink-text">诗酒趁年华</div>
    </div>

    <div class="divider"></div>

    <p class="description">
      千年之前，有人仗剑天涯，有人独钓寒江<br>
      有人醉卧长安，有人采菊东篱<br>
      十五道命题，<em>叩问灵魂深处的文人骨血</em>
    </p>

    <div class="literati-preview">
      <span>苏轼</span>
      <span>李白</span>
      <span>杜甫</span>
      <span>王维</span>
      <span>辛弃疾</span>
      <span>李清照</span>
      <span>陶渊明</span>
      <span>屈原</span>
    </div>

    <button class="btn-primary" onclick="startQuiz()">开 始 测 试</button>
  </div>

  <div class="copyright">
    <div class="copy-line">© 2026 版权所有 · 未经授权禁止转载</div>
    <div class="copy-line">原创设计 by Charles</div>
  </div>
</div>

<!-- 问卷页 -->
<div class="container" id="quizPage" style="display:none;">
  <div class="quiz-page">
    <div class="progress-bar">
      <div class="progress-info">
        <span>第 <span class="current-q" id="currentQ">1</span> / 15 题</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="question-card" id="questionCard">
      <!-- 动态渲染 -->
    </div>
  </div>
</div>

<!-- 加载页 -->
<div class="container" id="loadingPage" style="display:none;">
  <div class="loading-page">
    <div class="seal-stamp">命</div>
    <div class="loading-text">命运之轮转动中...</div>
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>

<!-- 结果页 -->
<div class="container" id="resultPage" style="display:none;">
  <div class="result-page" id="resultContent">
    <!-- 动态渲染 -->
  </div>

  <div class="copyright">
    <div class="copy-line">© 2026 版权所有 · 未经授权禁止转载</div>
    <div class="copy-line">原创设计 by Charles</div>
  </div>
</div>

<script>
// ===== 花瓣粒子 =====
function createPetals() {
  const body = document.body;
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      const petal = document.createElement('div');
      petal.className = 'petal';
      petal.style.left = Math.random() * 100 + 'vw';
      petal.style.animationDuration = (8 + Math.random() * 12) + 's';
      petal.style.animationDelay = Math.random() * 5 + 's';
      petal.style.animation = `petalFall ${8 + Math.random() * 12}s linear ${Math.random() * 5}s infinite`;
      const petals = ['🌸', '🍂', '✿', '❀', '🍃'];
      petal.innerHTML = `<span style="font-size:${10 + Math.random()*8}px">${petals[Math.floor(Math.random()*petals.length)]}</span>`;
      body.appendChild(petal);
    }, i * 800);
  }
}

function createParticles() {
  const body = document.body;
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = Math.random() * 100 + 'vh';
    p.style.animationDelay = Math.random() * 8 + 's';
    p.style.animationDuration = (6 + Math.random() * 6) + 's';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    body.appendChild(p);
  }
}

createPetals();
createParticles();

// ===== 核心逻辑 =====
let currentQuestion = 0;
let scores = {};

function initScores() {
  scores = {};
  const keys = Object.keys(literatiResults);
  keys.forEach(k => scores[k] = 0);
}

function startQuiz() {
  initScores();
  currentQuestion = 0;
  document.getElementById('startPage').style.display = 'none';
  document.getElementById('quizPage').style.display = 'flex';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQuestion];
  const labels = ['甲', '乙', '丙', '丁'];
  const card = document.getElementById('questionCard');

  // 更新进度
  document.getElementById('currentQ').textContent = currentQuestion + 1;
  const pct = Math.round((currentQuestion / 15) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  let html = `<div class="q-label">第${['一','二','三','四','五','六','七','八','九','十','十一','十二','十三','十四','十五'][currentQuestion]}题</div>`;
  html += `<div class="q-scene">${q.scene}</div>`;
  html += `<div class="q-text">${q.text}</div>`;
  html += `<div class="options">`;
  q.options.forEach((opt, i) => {
    html += `<div class="option-btn" onclick="selectOption(${i})" data-index="${i}">
      <div class="option-label">${labels[i]}</div>
      <div class="option-text">${opt.text}</div>
    </div>`;
  });
  html += `</div>`;

  card.innerHTML = html;
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = 'slideIn 0.5s ease';
}

function selectOption(index) {
  const q = questions[currentQuestion];
  const opt = q.options[index];

  // 计分
  Object.entries(opt.scores).forEach(([key, val]) => {
    scores[key] = (scores[key] || 0) + val;
  });

  // 视觉反馈
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.classList.remove('selected'));
  btns[index].classList.add('selected');

  // 下一题或显示结果
  setTimeout(() => {
    currentQuestion++;
    if (currentQuestion < 15) {
      renderQuestion();
    } else {
      showLoading();
    }
  }, 400);
}

function showLoading() {
  document.getElementById('quizPage').style.display = 'none';
  document.getElementById('loadingPage').style.display = 'flex';
  setTimeout(() => {
    document.getElementById('loadingPage').style.display = 'none';
    showResult();
  }, 2800);
}

function showResult() {
  // 计算结果
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const winner = sorted[0][0];
  const result = literatiResults[winner];

  // 获取前3名作为同类文人
  const kindred = sorted.slice(1, 4).map(([key, score]) => ({
    ...literatiResults[key],
    matchPct: Math.round((score / sorted[0][1]) * 100)
  }));

  const container = document.getElementById('resultPage');
  container.style.display = 'flex';

  const content = document.getElementById('resultContent');

  let html = `
    <div class="result-header">
      <div class="label">✦ 你的文人灵魂 ✦</div>
      <h2>${result.name}</h2>
      <div class="dynasty">${result.dynasty}</div>
    </div>

    <div class="portrait-frame">
      <div class="portrait-corner tl"></div>
      <div class="portrait-corner tr"></div>
      <div class="portrait-corner bl"></div>
      <div class="portrait-corner br"></div>
      <div class="portrait-placeholder" style="font-size:60px;">${result.portraitEmoji}</div>
    </div>

    <div class="poem-card">
      <div class="poem-source">—— 最贴合你灵魂的诗句 ——</div>
      <div class="poem-text">${result.poem.replace(/\n/g, '<br>')}</div>
      <div class="poem-title">${result.poemTitle}</div>
    </div>

    <div class="trait-tags">
      ${result.traits.map(t => `<span class="trait-tag">${t}</span>`).join('')}
    </div>

    <div class="analysis-section">
      <h3>✦ 灵 魂 解 读 ✦</h3>
      <div class="analysis-text">${result.analysis}</div>
    </div>

    <div class="kindred-section">
      <h3>与你灵魂相近的文人</h3>
      <div class="kindred-list">
        ${kindred.map(k => `
          <div class="kindred-item">
            ${k.name}
            <span class="match-pct">契合度 ${k.matchPct}%</span>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="result-actions">
      <button class="btn-primary" onclick="shareResult()">分 享 结 果</button>
      <button class="btn-secondary" onclick="restart()" style="margin-top:8px;">重 新 测 试</button>
    </div>
  `;

  content.innerHTML = html;
}

function shareResult() {
  // 复制结果文字到剪贴板
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const winner = sorted[0][0];
  const result = literatiResults[winner];

  const text = `【千年一梦·文人灵魂测试】\n\n我的灵魂文人是：${result.name}（${result.dynasty}）\n\n「${result.poem.split('\n')[0]}」\n\n${result.traits.join(' · ')}\n\n${result.analysis.slice(0, 60)}...\n\n来测测你是哪位文人墨客？`;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      alert('✨ 结果已复制到剪贴板，快去分享吧！');
    }).catch(() => {
      alert('复制失败，请手动复制分享~');
    });
  } else {
    alert('请手动复制以下内容分享：\n\n' + text);
  }
}

function restart() {
  document.getElementById('resultPage').style.display = 'none';
  document.getElementById('startPage').style.display = 'flex';
}
</script>
</body>
</html>
